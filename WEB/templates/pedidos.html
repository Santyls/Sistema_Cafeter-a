{% extends "base.html" %}
{% block title %}Pedidos{% endblock %}
{% block page_title %}Pedidos{% endblock %}

{% block content %}
<div class="toolbar">
  <div class="filter-group">
    <button class="active">Todos</button>
    <button>Hoy</button>
    <button>Semanal</button>
    <button>Mensual</button>
  </div>
  <div class="search-box">
    <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="searchPedidos" placeholder="Buscar por # de pedido o mesa" />
  </div>
</div>

<div class="card">
  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>N. Pedido</th>
          <th>Mesa</th>
          <th>Mesero</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Hora</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbodyPedidos">
        <tr><td colspan="7" style="text-align:center;color:#888;">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalDetallePedido">
  <div class="modal">
    <div class="modal-header">
      <h3>Detalle del pedido</h3>
      <button class="modal-close" onclick="closeModal('modalDetallePedido')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="pedidoInfo"></div>
    <div class="table-wrapper">
      <table class="data-table">
        <thead><tr><th>Producto</th><th>Cant.</th><th>Subtotal</th></tr></thead>
        <tbody id="pedidoDetalles"></tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalDetallePedido')">Cerrar</button>
    </div>
  </div>
</div>
{% endblock %}
