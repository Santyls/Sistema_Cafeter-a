{% extends "base.html" %}
{% block title %}Productos{% endblock %}
{% block page_title %}Productos{% endblock %}

{% block content %}
<div class="toolbar">
  <div class="filter-group">
    <button class="active">Todos</button>
  </div>
  <div style="display:flex; gap:10px;">
    <button class="btn btn-outline" onclick="exportProductosPDF()">📄 Exportar PDF</button>
    <button class="btn btn-outline" onclick="exportProductosXLSX()">📊 Exportar XLSX</button>
  </div>
</div>

<div class="grid grid-2" style="margin-bottom:20px;">
  <div class="card">
    <h3>Top 5 más caros</h3>
    <div class="chart-placeholder"><canvas id="chartTop"></canvas></div>
  </div>
  <div class="card">
    <h3>Top 5 más económicos</h3>
    <div class="chart-placeholder"><canvas id="chartLow"></canvas></div>
  </div>
</div>

<div class="card">
  <h3>Catálogo de productos</h3>
  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Disponible</th></tr>
      </thead>
      <tbody id="tbodyProductos">
        <tr><td colspan="4" style="text-align:center;color:#888;">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
