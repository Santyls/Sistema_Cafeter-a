<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · Cafetería Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">☕</div>
      <h1>Cafetería Admin</h1>
      <p class="subtitle">Ingresa tus credenciales para acceder al panel</p>

      <form action="{{ url_for('dashboard') }}">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="admin@cafeteria.com" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary">Iniciar sesión</button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('recuperar') }}">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>
</body>
</html>
