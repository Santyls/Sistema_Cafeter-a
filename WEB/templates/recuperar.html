<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña · Cafetería Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">☕</div>
      <h1>Recuperar contraseña</h1>
      <p class="subtitle">Te enviaremos un enlace a tu correo para restablecer tu contraseña</p>

      <form id="recoverForm">
        <div class="form-group">
          <label for="recoverEmail">Correo electrónico</label>
          <input type="email" id="recoverEmail" class="form-control" placeholder="admin@cafeteria.com" />
        </div>
        <button type="submit" class="btn btn-primary">Enviar enlace</button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('login') }}">← Volver a inicio de sesión</a>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
