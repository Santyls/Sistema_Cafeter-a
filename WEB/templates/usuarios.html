{% extends "base.html" %}
{% block title %}Usuarios{% endblock %}
{% block page_title %}Usuarios y roles{% endblock %}

{% block content %}
<div class="toolbar">
  <div class="filter-group">
    <button class="active">Todos</button>
    <button>Meseros</button>
    <button>Cocineros</button>
    <button>Cajeros</button>
  </div>
  <div style="display:flex; gap:10px;">
    <div class="search-box">
      <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" id="searchUsuarios" placeholder="Buscar usuario" />
    </div>
    <button class="btn btn-primary" onclick="abrirModalUsuario()" style="display:flex;align-items:center;gap:6px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar
    </button>
  </div>
</div>

<div class="card">
  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th><th>Correo</th><th>Contacto</th><th>Rol</th><th>Estado</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbodyUsuarios">
        <tr><td colspan="6" style="text-align:center;color:#888;">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalUsuario">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalUsuarioTitle">Agregar usuario</h3>
      <button class="modal-close" onclick="closeModal('modalUsuario')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form onsubmit="event.preventDefault(); saveUsuario();">
      <div class="grid-form-2">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="usrNombre" class="form-control" placeholder="Nombre" />
        </div>
        <div class="form-group">
          <label>Apellido paterno</label>
          <input type="text" id="usrApPaterno" class="form-control" placeholder="Apellido paterno" />
        </div>
      </div>
      <div class="grid-form-2">
        <div class="form-group">
          <label>Apellido materno</label>
          <input type="text" id="usrApMaterno" class="form-control" placeholder="Apellido materno" />
        </div>
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="usrUsuario" class="form-control" placeholder="nombre.usuario" />
        </div>
      </div>
      <div class="form-group">
        <label>Correo electronico</label>
        <input type="email" id="usrCorreo" class="form-control" placeholder="usuario@cafeteria.com" />
      </div>
      <div class="grid-form-2">
        <div class="form-group">
          <label>Telefono</label>
          <input type="text" id="usrTelefono" class="form-control" placeholder="442 000 0000" />
        </div>
        <div class="form-group">
          <label>Rol</label>
          <select id="usrRol" class="form-control">
            <option value="mesero">Mesero</option>
            <option value="cocinero">Cocinero</option>
            <option value="cajero">Cajero</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
      <div class="grid-form-2">
        <div class="form-group">
          <label>Contrasena</label>
          <input type="password" id="usrPassword" class="form-control" placeholder="********" />
        </div>
        <div class="form-group">
          <label>Confirmar contrasena</label>
          <input type="password" id="usrPassword2" class="form-control" placeholder="********" />
        </div>
      </div>
    </form>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalUsuario')">Cancelar</button>
      <button class="btn btn-primary" style="width:auto;" onclick="saveUsuario()">Guardar</button>
    </div>
  </div>
</div>
{% endblock %}
